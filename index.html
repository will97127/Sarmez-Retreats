<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarmèz Retreats | Gîte de Charme & Conciergerie Automatisée</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo-container">
        <span class="logo-top">Sarmèz</span>
        <span class="logo-bottom">Retreats</span>
    </div>
    <nav>
        <a href="#home">Accueil</a>
        <a href="#bungalows">Bungalow</a>
        <a href="#features">Service connecté</a>
        <a href="#planning">Tarif</a>
    </nav>
</header>

<section id="home" class="hero">
    <div class="hero-content">
        <h1>Votre Séjour Clé en Main, Sans Stress</h1>
        <p>Bungalows d'exception avec planning synchronisé, contrats automatisés et suivi client personnalisé.</p>
        <a href="#planning" class="btn">Réserver mon séjour</a>
    </div>
</section>

<section id="planning" class="container">
    <h2 class="section-title">Demande de Réservation</h2>
    <form id="booking-form" class="booking-card">
        <label>Bungalow :</label>
        <select id="bungalow" name="bungalow">
            <option value="SR Plage">SR Plage</option>
            <option value="SR Rivière">SR Rivière</option>
            <option value="SR Tradition">SR Tradition</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>Arrivée :</label><input type="date" id="date-in" name="date-in" required></div>
            <div style="flex: 1;"><label>Départ :</label><input type="date" id="date-out" name="date-out" required></div>
        </div>

        <label>Choisir un Pack :</label>
        <select id="pack" name="pack" onchange="updatePrice()">
            <option value="0">Aucun (Hébergement seul)</option>
            <option value="110">🌿 PACK BIEN-ÊTRE</option>
            <option value="380">🌊 PACK LOISIRS</option>
            <option value="280">🐂 PACK PATRIMOINE</option>
            <option value="750">👑 PACK SIGNATURE</option>
        </select>

        <div class="price-display">Estimation pack : <strong id="total-price">-- €</strong></div>
        
        <input type="email" id="email" name="email" placeholder="Votre email" required style="width: 100%; padding: 10px; margin: 10px 0;">
        <button type="submit" class="btn">Envoyer la demande</button>
    </form>
</section>
