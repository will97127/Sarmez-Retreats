<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarmèz Retreats | Conciergerie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo-container">
        <span class="logo-top">Sarmèz</span>
        <span class="logo-bottom">Retreats</span>
    </div>
    <nav>
        <a href="#home">Accueil</a>
        <a href="#bungalows">Bungalow</a>
        <a href="#planning">Tarif & Réservation</a>
    </nav>
</header>

<!-- Formulaire -->
<section id="planning" class="container">
    <h2 class="section-title">Réservation & Packs</h2>
    <form id="booking-form">
        <select id="bungalow" required class="large-select">
            <option value="">Choisir un bungalow</option>
            <option value="SR Plage">SR Plage - 200€ / nuit</option>
            <option value="SR Rivière">SR Rivière - 200€ / nuit</option>
            <option value="SR Tradition">SR Tradition - 200€ / nuit</option>
        </select>

        <input type="date" id="date-in" required class="large-select">
        <input type="date" id="date-out" required class="large-select">

        <select id="pack-select" class="large-select">
            <option value="0" data-name="Aucun">Choisir un pack (Optionnel)</option>
            <option value="150" data-name="Romantique">🌿 Pack Romantique (Champagne + Fleurs) - 150€</option>
            <optgroup label="🧖‍♂️ Bien-être">
                <option value="100" data-name="Massage Solo">Massage Solo (1h) - 100€</option>
                <option value="170" data-name="Massage Duo">Massage Duo (1h) - 170€</option>
            </optgroup>
            <optgroup label="🛶 Loisirs">
                <option value="220" data-name="Kayak Couple">Kayak (Couple) - 220€</option>
                <option value="380" data-name="Kayak Famille">Kayak (Famille 4p) - 380€</option>
                <option value="220" data-name="Paddle Couple">Paddle (Couple) - 220€</option>
                <option value="380" data-name="Paddle Famille">Paddle (Famille 4p) - 380€</option>
            </optgroup>
            <optgroup label="🐂 Patrimoine">
                <option value="160" data-name="Charrette Couple">Charrette à bœufs (Couple) - 160€</option>
                <option value="280" data-name="Charrette Famille">Charrette à bœufs (Famille 4p) - 280€</option>
            </optgroup>
        </select>

        <input type="email" id="email" placeholder="Votre email" required class="large-select">
        <button type="submit">Envoyer la demande</button>
    </form>
</section>

<!-- Widget Chatbot -->
<div class="chat-widget" id="chat-widget">
    <div class="chat-header" onclick="toggleChat()">
        <span>🤖 Conciergerie Sarmèz</span>
        <i class="fa-solid fa-chevron-up" id="chat-icon"></i>
    </div>
    <div class="chat-body" id="chat-body">
  <div id="chat-content">
    <strong>Sélectionnez vos services :</strong>
<div class="chat-options" id="services-form">
    <label><input type="checkbox" class="service-item" value="15"> Petit déjeuner : 15€</label><br>
    <label><input type="checkbox" class="service-item" value="20"> Ménage : 20€</label><br>
    <label><input type="checkbox" class="service-item" value="100"> Massage Solo : 100€</label>
</div>
        <hr>
        <p>Total services : <strong id="services-total">0€</strong></p>
        <button type="button" onclick="sendServicesRequest()">Demander ces services</button>
    </form>
</div>
         </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<div id="price-bar" class="price-bar">
    <div class="container">
        <span>Séjour : <strong><span id="night-total">0</span>€</strong></span>
        <span>+ Pack : <strong><span id="pack-total">0</span>€</strong></span>
        <div class="total-final">
    Total : <span id="display-total-final">1400€</span>
</div>

  </div>
</div>

    
</body>
</html>
